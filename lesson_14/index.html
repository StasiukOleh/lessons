<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/fonts.css" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
    <title>lesson_14</title>
  </head>
  <body>
    <div class="wrapper">
      <header class="header"><h1>LESSON_14</h1></header>
      <main class="page">
        <div class="page__container">
          <form action="#" class="page__forms">
            <div class="page__furniro">
              <div class="page__form-furniro">
                <label class="page__label" for="first-name">Your name</label>
                <input
                  autocomplete="off"
                  class="page__input"
                  type="text"
                  name="form[]"
                  id="first-name"
                  placeholder="Abc"
                />
              </div>
              <div class="page__form-furniro">
                <label class="page__label" for="user-email"
                  >Email address</label
                >
                <input
                  autocomplete="off"
                  class="page__input"
                  type="email"
                  name="form[]"
                  id="user-email"
                  placeholder="Abc@def.com"
                />
              </div>
              <div class="page__form-furniro">
                <label class="page__label" for="subject">Subject</label>
                <input
                  autocomplete="off"
                  class="page__input"
                  type="text"
                  name="form[]"
                  id="subject"
                  placeholder="This is an optional"
                />
              </div>
              <div class="page__form-furniro">
                <label class="page__label">Message</label>
                <textarea
                  autocomplete="off"
                  class="page__input"
                  name="form[]"
                  placeholder="Hi! i’d like to ask about"
                ></textarea>
              </div>
            </div>
            <div class="page__submit">
              <button type="submit" class="page__button">Submit</button>
            </div>
            <div class="page__sizes">
              <div class="page__items">
                <h2 class="page__title">Size</h2>
                <div class="page__item">
                  <div class="page__size">
                    <label class="page__differnt-size">
                      <input
                        class="page__various-input"
                        type="radio"
                        value="1"
                        name="form[]"
                      />
                      <span class="page__text">L</span>
                    </label>
                    <label class="page__differnt-size">
                      <input
                        class="page__various-input"
                        type="radio"
                        value="2"
                        name="form[]"
                      />
                      <span class="page__text">XL</span>
                    </label>
                    <label class="page__differnt-size">
                      <input
                        class="page__various-input"
                        type="radio"
                        value="3"
                        name="form[]"
                      />
                      <span class="page__text">XS</span>
                    </label>
                  </div>
                </div>
              </div>
              <div class="page__items">
                <h2 class="page__title">Color</h2>
                <div class="page__item">
                  <div class="page__options">
                    <label class="page__colors-differnt">
                      <input
                        class="page__color-violet"
                        type="radio"
                        value="4"
                        name="form[]"
                      />
                      <span class="page__color-text"></span>
                    </label>
                    <label class="page__colors-differnt">
                      <input
                        class="page__color-black"
                        type="radio"
                        value="5"
                        name="form[]"
                      />
                      <span class="page__color-text"></span>
                    </label>
                    <label class="page__colors-differnt">
                      <input
                        class="page__color-orange"
                        type="radio"
                        value="6"
                        name="form[]"
                      />
                      <span class="page__color-text"></span>
                    </label>
                  </div>
                </div>
              </div>
            </div>
          </form>
        </div>
        <footer class="footer">
        <div class="footer__author">
          © 2026 Oleh Stasiuk.Створено в межах навчального проєкту.
        </div>
      </footer>  
      </main>
    </div>
  </body>
</html>
